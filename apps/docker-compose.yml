services:
  postgres:
    image: postgres:16-alpine
    container_name: chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: chat-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chatdb
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: http://localhost:3333
      CLIENT_URL: http://localhost:4321
      PORT: 3333
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: chat-web
    restart: unless-stopped
    ports:
      - "4321:4321" # Porta padrão do Astro, definida no seu CLIENT_URL
    environment:
      # Adicione aqui variáveis de ambiente que o Astro possa precisar no Docker 
      PUBLIC_API_URL: http://localhost:3333
    depends_on:
      - api

volumes:
  postgres_data: