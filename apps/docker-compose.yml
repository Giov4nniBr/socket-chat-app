services:
  postgres:
    image: postgres:16-alpine
    container_name: chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: chat-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chatdb
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # nome precisa bater com o que src/lib/auth.ts lê (process.env.BASE_URL)
      BASE_URL: http://localhost:3333
      CLIENT_URL: http://localhost:4321
      PORT: 3333
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # embutido no bundle do client em build time (Astro/Vite),
        # precisa ser a URL que o NAVEGADOR do usuário vai acessar
        PUBLIC_API_URL: http://localhost:3333
    container_name: chat-web
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      # usado só em SSR (server-side), pra alcançar o container "api" pela
      # rede interna do compose. Diferente de PUBLIC_API_URL (embutido no
      # bundle do navegador em build time), esse é lido em runtime.
      INTERNAL_API_URL: http://api:3333
    depends_on:
      - api

volumes:
  postgres_data: